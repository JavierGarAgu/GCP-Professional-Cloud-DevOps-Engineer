runtime: python311


entrypoint: gunicorn -b :${PORT} main:app



automatic_scaling:


  min_num_instances: 1


  max_num_instances: 2




readiness_check:


  path: "/health"


  check_interval_sec: 5


  timeout_sec: 4


  failure_threshold: 2


  success_threshold: 2




liveness_check:


  path: "/health"


  check_interval_sec: 30


  timeout_sec: 4


  failure_threshold: 4


  success_threshold: 2

