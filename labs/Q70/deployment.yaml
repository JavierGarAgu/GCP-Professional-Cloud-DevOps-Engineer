apiVersion: apps/v1

kind: Deployment

metadata:

  name: mobile-game

  labels:

    app: mobile-game

spec:

  replicas: 3

  selector:

    matchLabels:

      app: mobile-game

  template:

    metadata:

      labels:

        app: mobile-game

    spec:

      containers:

      - name: mobile-game

        image: nginx:latest

        ports:

        - containerPort: 80

        resources:

          requests:

            cpu: "100m"

            memory: "128Mi"

          limits:

            cpu: "250m"

            memory: "256Mi"